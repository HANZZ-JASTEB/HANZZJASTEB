<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANZZ JASTEB | Add Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0a0a0a; min-height: 100vh; color: #e0e0e0; }
        .navbar { background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid rgba(255,59,59,0.3); position: sticky; top: 0; z-index: 100; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #ff3b3b, #ff8080); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo span { color: #666; font-weight: normal; font-size: 0.9rem; }
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .nav-btn { background: rgba(255,59,59,0.1); color: #ff6b6b; border: 1px solid rgba(255,59,59,0.3); padding: 8px 18px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 13px; transition: all 0.2s; }
        .nav-btn:hover { background: rgba(255,59,59,0.2); border-color: #ff3b3b; }
        .logout-btn { background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.4); padding: 8px 18px; border-radius: 10px; color: #ff6b6b; cursor: pointer; }
        .logout-btn:hover { background: rgba(255,59,59,0.25); }
        .container { max-width: 500px; margin: 60px auto; padding: 0 20px; }
        .form-card { background: #111; border-radius: 20px; padding: 35px; border-top: 4px solid #ff3b3b; border: 1px solid rgba(255,59,59,0.2); }
        .form-card h2 { color: #ff3b3b; margin-bottom: 8px; font-size: 24px; }
        .form-card .subtitle { color: #888; margin-bottom: 28px; font-size: 13px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; font-size: 14px; color: #fff; transition: all 0.2s; }
        .form-group input:focus { outline: none; border-color: #ff3b3b; box-shadow: 0 0 0 3px rgba(255,59,59,0.1); }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff3b3b, #cc0000); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,59,59,0.3); }
        .btn-submit:disabled { opacity: 0.6; transform: none; }
        .alert { position: fixed; bottom: 25px; right: 25px; padding: 12px 20px; border-radius: 12px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; display: none; font-size: 13px; }
        .alert-success { background: #10b981; }
        .alert-error { background: #ef4444; }
        .loading { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 640px) { .navbar-content { flex-direction: column; text-align: center; } .form-card { padding: 25px; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">HANZZ JASTEB <span>| Add Data</span></div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">🏠 Dashboard</a>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="form-card">
            <h2>Tambah Data</h2>
            <p class="subtitle">Masukkan Email & Password ke database</p>
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="contoh@email.com" autocomplete="off"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="********"></div>
            <button class="btn-submit" id="submitBtn" onclick="tambahData()">Simpan</button>
        </div>
    </div>
    <div id="alert" class="alert"></div>
    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/7dlf0v09e7kqb";
        const userData = localStorage.getItem("userLogin");
        if (!userData) { window.location.href = "index.html"; }
        const user = JSON.parse(userData);
        if (user.role !== "Admin" && user.role !== "Developer") { alert("Akses ditolak! Halaman ini hanya untuk Admin & Developer."); window.location.href = "index.html"; }
        function showAlert(msg, type) { const a = document.getElementById("alert"); a.textContent = msg; a.className = `alert alert-${type}`; a.style.display = "block"; setTimeout(() => a.style.display = "none", 3000); }
        function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        async function tambahData() {
            const email = document.getElementById("email").value.trim();
            const pass = document.getElementById("password").value;
            if (!email) { showAlert("Email harus diisi!", "error"); return; }
            if (!isValidEmail(email)) { showAlert("Format email tidak valid!", "error"); return; }
            if (!pass) { showAlert("Password harus diisi!", "error"); return; }
            const btn = document.getElementById("submitBtn");
            btn.disabled = true; btn.innerHTML = '<span class="loading"></span> Menyimpan...';
            try {
                const res = await fetch(SHEETDB_URL);
                const existing = await res.json();
                if (existing.find(i => i.Email === email)) { showAlert(`Email "${email}" sudah ada!`, "error"); btn.disabled=false; btn.innerHTML="Simpan"; return; }
                const post = await fetch(SHEETDB_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ Email: email, Password: pass }) });
                if (!post.ok) throw new Error("Gagal simpan");
                showAlert("Data berhasil ditambahkan!", "success");
                document.getElementById("email").value = ""; document.getElementById("password").value = "";
            } catch(e) { showAlert("Error: " + e.message, "error"); }
            finally { btn.disabled = false; btn.innerHTML = "Simpan"; }
        }
        function logout() { localStorage.removeItem("userLogin"); window.location.href = "index.html"; }
    </script>
</body>
</html>
