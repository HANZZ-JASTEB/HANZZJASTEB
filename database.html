<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANZZ JASTEB | Database User</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0a0a0a; min-height: 100vh; color: #e0e0e0; }
        .navbar { background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid rgba(255,59,59,0.3); }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #ff3b3b, #ff8080); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-refresh { background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.3); padding: 8px 18px; border-radius: 10px; color: #ff6b6b; cursor: pointer; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .header-section { background: #111; border-radius: 16px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,59,59,0.2); }
        .header-section h2 { color: #ff3b3b; }
        .table-container { background: #111; border-radius: 16px; overflow-x: auto; border: 1px solid rgba(255,59,59,0.2); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #1a1a1a; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        th { color: #ff6b6b; font-weight: 600; }
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .role-admin { background: rgba(255,59,59,0.2); color: #ff6b6b; }
        .role-user { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .btn-hapus { background: #dc2626; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-hapus:hover { background: #b91c1c; }
        .loading-state, .empty-state { text-align: center; padding: 40px; color: #888; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #2a2a2a; border-radius: 50%; border-top-color: #ff3b3b; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { position: fixed; bottom: 25px; right: 25px; padding: 12px 20px; border-radius: 12px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; display: none; }
        .alert-success { background: #10b981; }
        .alert-error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .footer-note { text-align: center; margin-top: 30px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">HANZZ JASTEB <span>| Database User</span></div>
            <button class="btn-refresh" onclick="ambilDataUser()">⟳ Refresh</button>
        </div>
    </div>
    <div class="container">
        <div class="header-section"><h2>Data User</h2></div>
        <div class="table-container"><div id="tableContent"><div class="loading-state"><div class="spinner"></div><p>Loading...</p></div></div></div>
        <div class="footer-note">Present By HANZZ</div>
    </div>
    <div id="alert" class="alert"></div>
    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/dywc2rk19dipr";
        const userData = localStorage.getItem("userLogin");
        if (!userData) { window.location.href = "index.html"; }
        const user = JSON.parse(userData);
        if (user.role !== "Developer") { alert("Akses ditolak! Halaman ini hanya untuk Developer."); window.location.href = "index.html"; }
        function showAlert(msg, type) { const a = document.getElementById("alert"); a.textContent = msg; a.className = `alert alert-${type}`; a.style.display = "block"; setTimeout(() => a.style.display = "none", 3000); }
        function escapeHtml(t) { if(!t) return ""; const d=document.createElement("div"); d.textContent=t; return d.innerHTML; }
        async function ambilDataUser() {
            const container = document.getElementById("tableContent");
            container.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>`;
            try {
                const res = await fetch(SHEETDB_URL);
                if(!res.ok) throw new Error("Gagal");
                const users = await res.json();
                if(!users.length){ container.innerHTML = `<div class="empty-state"><p>📭 Belum ada data user.</p></div>`; return; }
                let html = `<table><thead><tr><th>No</th><th>Username</th><th>Role</th><th>Limit</th><th style="text-align:center">Aksi</th></tr></thead><tbody>`;
                users.forEach((u,i) => {
                    let roleClass = u.Role === "Admin" || u.Role === "admin" ? "role-admin" : "role-user";
                    html += `<tr><td>${i+1}</td><td><strong>${escapeHtml(u.Username)}</strong></td><td><span class="role-badge ${roleClass}">${escapeHtml(u.Role||"user")}</span></td><td>${escapeHtml(u.Limit||"0")}</td><td style="text-align:center"><button class="btn-hapus" onclick="hapusUser('${escapeHtml(u.Username)}')">Hapus</button></td></tr>`;
                });
                html += `</tbody></table>`;
                container.innerHTML = html;
                showAlert(`✅ ${users.length} data user`, "success");
            } catch(e) { container.innerHTML = `<div class="empty-state"><p>❌ Gagal: ${e.message}</p><button class="btn-refresh" onclick="ambilDataUser()" style="margin-top:15px">Coba Lagi</button></div>`; showAlert("Gagal ambil data","error"); }
        }
        async function hapusUser(username) {
            if(!confirm(`Hapus user "${username}"?`)) return;
            try {
                const res = await fetch(`${SHEETDB_URL}/Username/${encodeURIComponent(username)}`, { method: "DELETE", headers: { "Content-Type": "application/json" } });
                if(!res.ok) throw new Error("Gagal");
                showAlert(`User "${username}" dihapus!`, "success");
                await ambilDataUser();
            } catch(e) { showAlert("Gagal hapus: "+e.message, "error"); }
        }
        ambilDataUser();
    </script>
</body>
</html>
