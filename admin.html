<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANZZ JASTEB | Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0a0a0a; min-height: 100vh; color: #e0e0e0; }
        .navbar { background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid rgba(255,59,59,0.3); position: sticky; top: 0; z-index: 100; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #ff3b3b, #ff8080); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo span { color: #666; font-weight: normal; font-size: 0.9rem; }
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .nav-btn { background: rgba(255,59,59,0.1); color: #ff6b6b; border: 1px solid rgba(255,59,59,0.3); padding: 8px 18px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 13px; transition: all 0.2s; }
        .nav-btn:hover { background: rgba(255,59,59,0.2); border-color: #ff3b3b; }
        .logout-btn { background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.4); padding: 8px 18px; border-radius: 10px; color: #ff6b6b; cursor: pointer; }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .form-card { background: #111; border-radius: 20px; padding: 35px; border-top: 4px solid #ff3b3b; border: 1px solid rgba(255,59,59,0.2); }
        .form-card h2 { color: #ff3b3b; margin-bottom: 8px; font-size: 24px; }
        .form-card .subtitle { color: #888; margin-bottom: 28px; font-size: 13px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; font-size: 14px; color: #fff; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff3b3b; }
        .limit-auto { background: #1a1a1a; padding: 12px; border-radius: 12px; text-align: center; color: #ff8c42; border: 1px solid #333; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff3b3b, #cc0000); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,59,59,0.3); }
        .alert { position: fixed; bottom: 25px; right: 25px; padding: 12px 20px; border-radius: 12px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; display: none; }
        .alert-success { background: #10b981; }
        .alert-error { background: #ef4444; }
        .loading { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">HANZZ JASTEB <span>| Admin Panel</span></div>
            <div class="nav-links"><a href="index.html" class="nav-btn">🏠 Dashboard</a><a href="database.html" class="nav-btn">🗄️ DB User</a><button class="logout-btn" onclick="logout()">🚪 Logout</button></div>
        </div>
    </div>
    <div class="container">
        <div class="form-card">
            <h2>Tambah User Baru</h2>
            <p class="subtitle">Buat akun Member atau Admin</p>
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="username" autocomplete="off"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="********"></div>
            <div class="form-group"><label>Role</label><select id="role" onchange="ubahLimit()"><option value="Member">Member</option><option value="Admin">Admin</option></select></div>
            <div class="form-group" id="limitGroup"><label>Limit</label><div id="limitInput"></div></div>
            <button class="btn-submit" id="submitBtn" onclick="tambahUser()">Simpan User</button>
        </div>
    </div>
    <div id="alert" class="alert"></div>
    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/02k55cr9l5wzs";
        const userData = localStorage.getItem("userLogin");
        if (!userData) { window.location.href = "index.html"; }
        const user = JSON.parse(userData);
        if (user.role !== "Developer") { alert("Akses ditolak! Halaman ini hanya untuk Developer."); window.location.href = "index.html"; }
        function showAlert(msg, type) { const a = document.getElementById("alert"); a.textContent = msg; a.className = `alert alert-${type}`; a.style.display = "block"; setTimeout(() => a.style.display = "none", 3000); }
        function ubahLimit() {
            const role = document.getElementById("role").value;
            const div = document.getElementById("limitInput");
            if (role === "Admin") div.innerHTML = `<div class="limit-auto">♾️ Unlimited (N)</div>`;
            else div.innerHTML = `<input type="number" id="limit" min="1" max="20" value="10"><small style="color:#888; display:block; margin-top:5px;">Limit Member 1-20</small>`;
        }
        async function tambahUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            if (!username) { showAlert("Username wajib!", "error"); return; }
            if (!password) { showAlert("Password wajib!", "error"); return; }
            let limit = "";
            if (role === "Admin") limit = "N";
            else { const l = document.getElementById("limit"); if (!l || !l.value) { showAlert("Limit wajib!", "error"); return; } limit = l.value; if (parseInt(limit)<1 || parseInt(limit)>20) { showAlert("Limit Member 1-20", "error"); return; } }
            const btn = document.getElementById("submitBtn");
            btn.disabled = true; btn.innerHTML = '<span class="loading"></span> Menyimpan...';
            try {
                const res = await fetch(SHEETDB_URL);
                const users = await res.json();
                if (users.find(u => u.Username === username)) { showAlert(`Username "${username}" sudah ada!`, "error"); btn.disabled=false; btn.innerHTML="Simpan User"; return; }
                const post = await fetch(SHEETDB_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ Username: username, Password: password, Role: role, Limit: limit }) });
                if (!post.ok) throw new Error("Gagal simpan");
                showAlert(`User "${username}" berhasil ditambahkan!`, "success");
                document.getElementById("username").value = ""; document.getElementById("password").value = ""; document.getElementById("role").value = "Member"; ubahLimit();
            } catch(e) { showAlert("Error: "+e.message, "error"); }
            finally { btn.disabled=false; btn.innerHTML="Simpan User"; }
        }
        function logout() { localStorage.removeItem("userLogin"); window.location.href = "index.html"; }
        ubahLimit();
    </script>
</body>
</html>
